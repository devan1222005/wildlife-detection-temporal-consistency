<!DOCTYPE html>
<html>
<head>
    <title>YOLO Detection Comparison</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f9;
            text-align: center;
            padding: 40px;
        }

        h1 {
            color: #2c3e50;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 500px;
            margin: auto;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        input[type="file"] {
            margin: 15px;
        }

        button {
            padding: 10px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #2980b9;
        }

        .result {
            margin-top: 20px;
            font-weight: bold;
        }

        .detected {
            color: red;
        }

        .safe {
            color: green;
        }

        img {
            margin-top: 20px;
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>🐾 YOLO vs YOLO + Temporal Consistency</h1>

    <div class="card">

        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="video" required>
            <br>
            <button type="submit">Upload & Detect</button>
        </form>

        {% if base_result %}
        <div class="result">
            <p>
                🔹 Base YOLO Result:
                <span class="{{ 'detected' if base_result == 'Detected' else 'safe' }}">
                    {{ base_result }}
                </span>
            </p>

            <p>
                🔹 Temporal Consistency Result:
                <span class="{{ 'detected' if temporal_result == 'Confirmed' else 'safe' }}">
                    {{ temporal_result }}
                </span>
            </p>
        </div>
        {% endif %}

        {% if image %}
        <img src="{{ url_for('static', filename=image) }}">
        {% endif %}

    </div>

</body>
</html>
